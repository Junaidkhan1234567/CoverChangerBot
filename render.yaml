services:
  - type: worker
    name: CoverChangerBot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false  # Ye Render dashboard mein dalna
      - key: OWNER_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: FORCE_SUB_CHANNEL_ID
        sync: false
      - key: LOG_CHANNEL_ID
        sync: false
